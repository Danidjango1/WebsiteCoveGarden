name: Deploy to all-inkl FTP

# Automatisches Deployment bei jedem Push zu master
on:
  workflow_dispatch:
  push:
    branches:
      - master

    paths:
      - '*.html'
      - '*.css'
      - '*.js'
      - '.htaccess'
      - 'images/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-all-inkl-master
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Upload to FTP (attempt 1)
        id: ftp_upload_attempt_1
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with: 
          protocol: ftp
          port: 21

          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          # Nur diese Dateien hochladen
          exclude: |
            **/.git*
            **/node_modules/**
            **/.agents/**
            **/.claude/**
            **/.env
            **/.env.example
            **/CLAUDE.md
            **/*.md
            **/requirements.txt
            **/upload-ftp.py
            **/.vscode/**
            **/skills-lock.json
            **/README.md
            **/.gitignore
            **/FTP-UPLOAD.md
            **/.github/**
            **/wp-admin/**
            **/wp-content/**
            **/wp-includes/**
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: true

      - name: Wait before retry
        if: steps.ftp_upload_attempt_1.outcome == 'failure'
        run: sleep 20

      - name: Upload to FTP (attempt 2)
        id: ftp_upload_attempt_2
        if: steps.ftp_upload_attempt_1.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with: 
          protocol: ftp
          port: 21

          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          # Nur diese Dateien hochladen
          exclude: |
            **/.git*
            **/node_modules/**
            **/.agents/**
            **/.claude/**
            **/.env
            **/.env.example
            **/CLAUDE.md
            **/*.md
            **/requirements.txt
            **/upload-ftp.py
            **/.vscode/**
            **/skills-lock.json
            **/README.md
            **/.gitignore
            **/FTP-UPLOAD.md
            **/.github/**
            **/wp-admin/**
            **/wp-content/**
            **/wp-includes/**
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: true

      - name: Fail if both attempts failed
        if: steps.ftp_upload_attempt_1.outcome == 'failure' && steps.ftp_upload_attempt_2.outcome == 'failure'
        run: |
          echo "FTP deployment failed twice (attempt 1 and 2)."
          exit 1

      - name: Deployment Success ✅
        if: success()
        run: echo "Website erfolgreich zu all-inkl deployed!"

      - name: Deployment Failed ❌
        if: failure()
        run: |
          echo "Deployment fehlgeschlagen!"
          echo "Überprüfe die GitHub Secrets: FTP_HOST, FTP_USER, FTP_PASSWORD, FTP_REMOTE_PATH"
