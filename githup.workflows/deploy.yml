name: Deploy Website to All-Inkl
on:
  push:
    branches:
      - main # Der Trigger-Branch

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Get latest code
        uses: actions/checkout@v4 # Holt den Code aus dem Repo

      - name: Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # Beliebte Action für FTP
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # server-dir: /public_html/ # Zielordner bei All-Inkl (optional)
